name: daily-instagram-story

on:
  schedule:
    # 朝の単発TIPSストーリー。過去投稿の中身ページを1枚ずつ巡回して出す。
    # GitHubのcronは遅延しやすいので0分ちょうどを避ける。
    - cron: "7 23 * * *"    # 08:07 JST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-story
  cancel-in-progress: false

jobs:
  story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Story tips (投資垢 はる)
        continue-on-error: true
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
          STORY_MODE: tips
          STATE_FILE: story_state.json
        run: python3 story.py

      - name: Story tips (美容垢 みお)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN_BIYOU }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
          QUEUE_FILE: biyou/queue.json
          STORY_MODE: tips
          STATE_FILE: biyou/story_state.json
        run: |
          if [ -z "$IG_TOKEN" ]; then
            echo "SKIP: IG_TOKEN_BIYOU が未設定"
          else
            python3 story.py
          fi

      - name: Commit story cursor
        # 次にどの画像を出すかのカーソルを保存する(同じ画像を繰り返さないため)
        if: ${{ !cancelled() }}
        run: |
          git config user.name "autopost-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet story_state.json biyou/story_state.json 2>/dev/null || [ -n "$(git status --porcelain story_state.json biyou/story_state.json)" ]; then
            git add story_state.json biyou/story_state.json
            git commit -m "story cursor $(date -u +%F)"
            git push
          else
            echo "no cursor change"
          fi
