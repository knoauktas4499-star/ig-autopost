name: daily-instagram-post

on:
  schedule:
    # GitHubのcronはベストエフォートで、毎時0分など混雑する時刻ほど遅延・破棄されやすい。
    # 分をずらしたうえで3回発火させ、どれか1回が通れば投稿される形にしている。
    # 2回目以降はpost.py側の同日ガード(ALREADY_POSTED)で自動的にスキップされる。
    - cron: "12 10 * * *"   # 19:12 JST (本命)
    - cron: "42 10 * * *"   # 19:42 JST (予備1)
    - cron: "22 11 * * *"   # 20:22 JST (予備2)
  workflow_dispatch: {}     # 手動実行も可

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post to Instagram (投資垢 はる)
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python3 post.py

      - name: Post to Instagram (美容垢 みお)
        # 投資垢が失敗しても美容垢の投稿は独立して試みる
        if: ${{ !cancelled() }}
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN_BIYOU }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
          QUEUE_FILE: biyou/queue.json
        run: |
          if [ -z "$IG_TOKEN" ]; then
            echo "SKIP: IG_TOKEN_BIYOU が未設定のため美容垢の投稿をスキップ"
          else
            python3 post.py
          fi

      - name: Story announce (投資垢 はる)
        # 当日投稿したカルーセルの表紙を告知ストーリーとして流す
        # (当日分がまだ無い日は story.py 側で NO_STORY となり何もしない)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
          STORY_MODE: announce
        run: python3 story.py

      - name: Story announce (美容垢 みお)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN_BIYOU }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/main
          QUEUE_FILE: biyou/queue.json
          STORY_MODE: announce
        run: |
          if [ -z "$IG_TOKEN" ]; then
            echo "SKIP: IG_TOKEN_BIYOU が未設定"
          else
            python3 story.py
          fi

      - name: Commit queue update
        # 片方が失敗しても、投稿に成功した分のキュー更新は必ず記録する
        # (ここをスキップすると投稿済みなのにpendingのまま残り、翌日に重複投稿される)
        if: ${{ !cancelled() }}
        run: |
          git config user.name "autopost-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet queue.json biyou/queue.json; then
            git add queue.json biyou/queue.json
            git commit -m "mark posted $(date -u +%F)"
            git push
          else
            echo "no queue change"
          fi
